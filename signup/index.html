<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="signup-box shadow">

        <h2 class="text-center mb-4">
            회원가입
        </h2>

        <!-- 이메일 -->
        <div class="mb-3">

            <label class="form-label">
                이메일
            </label>

            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="example@email.com">

            <div id="emailError" class="text-danger small mt-1"></div>

        </div>

        <!-- 닉네임 -->
        <div class="mb-3">

            <label class="form-label">
                닉네임
            </label>

            <input
                type="text"
                id="nickname"
                class="form-control"
                maxlength="20"
                placeholder="닉네임">

            <div id="nicknameError" class="text-danger small mt-1"></div>

        </div>

        <!-- 비밀번호 -->
        <div class="mb-3">

            <label class="form-label">
                비밀번호
            </label>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="8자 이상">

                <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword">

                    <i class="bi bi-eye"></i>

                </button>

            </div>

            <div class="form-text">
                영문, 숫자를 포함한 8자 이상을 권장합니다.
            </div>

            <div id="passwordError" class="text-danger small mt-1"></div>

        </div>

        <!-- 비밀번호 확인 -->
        <div class="mb-3">

            <label class="form-label">
                비밀번호 확인
            </label>

            <div class="input-group">

                <input
                    type="password"
                    id="confirmPassword"
                    class="form-control"
                    placeholder="비밀번호 다시 입력">

                <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="toggleConfirmPassword">

                    <i class="bi bi-eye"></i>

                </button>

            </div>

            <div id="confirmError" class="text-danger small mt-1"></div>

        </div>

        <!-- 회원가입 -->
        <button
            id="signupBtn"
            class="btn btn-primary w-100">

            회원가입

        </button>

        <!-- 결과 -->
        <div
            id="result"
            class="text-center mt-3">
        </div>

        <hr>

        <!-- Discord 로그인 -->
        <button
            id="discordLogin"
            class="btn btn-secondary w-100">

            <i class="bi bi-discord"></i>
            Discord로 로그인

        </button>

        <!-- 로그인 이동 -->
        <button
            class="btn btn-link w-100 mt-3"
            onclick="location.href='login.html'">

            이미 계정이 있으신가요? 로그인

        </button>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JavaScript -->
<script src="signup.js"></script>

</body>
</html>
